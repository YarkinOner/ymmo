{% extends 'base.html' %}
{% block title %}Connexion{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-4">
<h3 class="mb-3">Connexion</h3>
<form method="post">
  <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
  <div class="mb-3"><label class="form-label">Mot de passe</label><input class="form-control" type="password" name="password" required></div>
  <button class="btn btn-dark w-100">Se connecter</button>
</form>
<p class="mt-3 text-center">Pas de compte ? <a href="{{ url_for('auth.register') }}">S'inscrire</a></p>
</div></div>
{% endblock %}
