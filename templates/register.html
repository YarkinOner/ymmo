{% extends 'base.html' %}
{% block title %}Inscription{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-4">
<h3 class="mb-3">Créer un compte</h3>
<form method="post">
  <div class="mb-3"><label class="form-label">Nom</label><input class="form-control" name="name" required></div>
  <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
  <div class="mb-3"><label class="form-label">Mot de passe</label><input class="form-control" type="password" name="password" required></div>
  <button class="btn btn-dark w-100">S'inscrire</button>
</form>
</div></div>
{% endblock %}
