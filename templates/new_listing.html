{% extends 'base.html' %}
{% block title %}Nouvelle annonce{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-7">
<h3 class="mb-3">Publier une annonce</h3>
<form method="post">
  <div class="mb-3"><label class="form-label">Titre</label><input class="form-control" name="title" required></div>
  <div class="row mb-3">
    <div class="col"><label class="form-label">Type</label>
      <select class="form-select" name="type">
        <option value="vente">Vente</option>
        <option value="location">Location</option>
      </select>
    </div>
    <div class="col"><label class="form-label">Catégorie</label>
      <select class="form-select" name="property_type">
        <option>appartement</option><option>maison</option><option>bureau</option><option>terrain</option>
      </select>
    </div>
  </div>
  <div class="row mb-3">
    <div class="col"><label class="form-label">Prix (€)</label><input class="form-control" type="number" name="price" required></div>
    <div class="col"><label class="form-label">Surface (m²)</label><input class="form-control" type="number" name="area_m2" required></div>
    <div class="col"><label class="form-label">Pièces</label><input class="form-control" type="number" name="rooms" required></div>
  </div>
  <div class="mb-3"><label class="form-label">Ville</label><input class="form-control" name="city" required></div>
  <div class="mb-3"><label class="form-label">Adresse</label><input class="form-control" name="address"></div>
  <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="4"></textarea></div>
  <button class="btn btn-dark w-100">Publier</button>
</form>
</div></div>
{% endblock %}
